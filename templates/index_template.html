<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCUP Archive - XVIthk</title>
    <style>
        :root {
            --bg-primary-light: #f8f9fa;
            --bg-secondary-light: #ffffff;
            --text-primary-light: #2c3e50;
            --text-secondary-light: #6c757d;
            --bg-primary-dark: #0a0e17;
            --bg-secondary-dark: #141a26;
            --text-primary-dark: #e6edf3;
            --text-secondary-dark: #8b9bae;
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
            --accent-start: #3498db;
            --accent-end: #9b59b6;
            --accent: #5e72e4;
            --accent-hover: #6a7df4;
            --accent-glow: rgba(94, 114, 228, 0.25);
            --card-radius: 16px;
            /* 反馈模式颜色 */
            --feedback-start: #e74c3c;
            --feedback-end: #c0392b;
        }

        [data-theme="dark"] {
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
        }

        [data-theme="light"] {
            --bg-primary: var(--bg-primary-light);
            --bg-secondary: var(--bg-secondary-light);
            --text-primary: var(--text-primary-light);
            --text-secondary: var(--text-secondary-light);
            --accent-glow: rgba(94, 114, 228, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            animation: pageFadeIn 0.5s ease-out;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--text-secondary);
            position: relative;
        }

        .site-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .site-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .warning {
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.08), rgba(155, 89, 182, 0.08));
            border-left: 4px solid var(--accent);
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: 0 12px 12px 0;
            backdrop-filter: blur(4px);
        }

        .works-list {
            list-style: none;
        }

        .work-item {
            background-color: var(--bg-secondary);
            border-radius: var(--card-radius);
            margin-bottom: 1.5rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(var(--text-secondary), 0.2);
            opacity: 0;
            transform: translateY(30px);
            animation: cardReveal 0.5s ease-out forwards;
            animation-delay: calc(var(--card-index, 0) * 0.08s);
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .work-item:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            border-color: var(--accent);
        }

        .work-item:hover .work-title {
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.15), rgba(155, 89, 182, 0.15));
        }

        .work-title {
            padding: 1.2rem;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid rgba(var(--text-secondary), 0.3);
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            transition: background 0.3s ease;
        }

        .work-title::before {
            content: "📖";
            margin-right: 0.8rem;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .work-item:hover .work-title::before {
            transform: scale(1.1) rotate(5deg);
        }

        .chapter-list {
            list-style: none;
            padding: 0.5rem 0;
        }

        .chapter-item {
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid rgba(var(--text-secondary), 0.15);
            transition: all 0.25s ease;
        }

        .chapter-item:hover {
            background: var(--accent-glow);
            padding-left: 1.6rem;
        }

        .chapter-item:last-child {
            border-bottom: none;
        }

        .chapter-link {
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.25s ease;
        }

        .chapter-link:hover {
            color: var(--accent-hover);
        }

        .chapter-link::before {
            content: "→";
            margin-right: 0.8rem;
            color: var(--accent);
            font-weight: bold;
            transition: transform 0.25s ease;
        }

        .chapter-link:hover::before {
            transform: translateX(4px);
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .container { padding: 1.5rem; }
            .site-title { font-size: 2rem; }
        }

        .nav-button {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            text-decoration: none;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px var(--accent-glow);
            filter: brightness(1.05);
        }

        .theme-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--text-secondary);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            background: var(--accent);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* ========== ✨ 立体公告牌/反馈按钮 ========== */
        .action-card {
            position: relative;
            margin-bottom: 2rem;
        }

        /* 立体浮动按钮 */
        .action-badge {
            position: absolute;
            top: -14px;
            left: 20px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            z-index: 20;
            transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 默认蓝色渐变 */
        .action-badge.default-mode {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: white;
            left: 20px;
            right: auto;
        }

        /* 反馈模式：番茄红 + 右侧位置 */
        .action-badge.feedback-mode {
            background: linear-gradient(135deg, var(--feedback-start), var(--feedback-end));
            color: white;
            left: auto;
            right: 20px;
        }

        /* 悬浮动画 */
        .action-badge:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        /* 点击波纹效果 */
        .action-badge:active {
            transform: translateY(1px) scale(0.98);
            transition: 0.05s;
        }

        /* 下方大卡片 */
        .action-content-card {
            background-color: var(--bg-secondary);
            border-radius: var(--card-radius);
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-left: 4px solid var(--accent);
            min-height: 150px;
        }

        /* 反馈模式下的边框颜色变化 */
        .action-content-card.feedback-mode {
            border-left-color: var(--feedback-start);
        }

        /* 内容区域动画 */
        .action-content-inner {
            animation: contentSwitch 0.3s ease-out;
        }

        @keyframes contentSwitch {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 反馈表单样式 */
        .feedback-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .feedback-form input,
        .feedback-form textarea {
            background: var(--bg-primary);
            border: 1px solid var(--text-secondary);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .feedback-form input:focus,
        .feedback-form textarea:focus {
            outline: none;
            border-color: var(--feedback-start);
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.2);
        }

        .feedback-form textarea {
            resize: vertical;
            min-height: 100px;
        }

        .feedback-form button {
            background: linear-gradient(135deg, var(--feedback-start), var(--feedback-end));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            transition: all 0.3s ease;
            align-self: flex-start;
        }

        .feedback-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(231, 76, 60, 0.3);
        }

        /* 普通内容样式 */
        .normal-content {
            line-height: 1.7;
        }

        .normal-content .loading-text {
            color: var(--text-secondary);
            font-style: italic;
        }

        body, .container, header, footer, 
        .work-item, .work-title, .chapter-item,
        .action-content-card, .warning, .theme-btn, .nav-button {
            transition: background-color 0.4s ease-in-out, 
                        color 0.4s ease-in-out, 
                        border-color 0.4s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="site-title">MCUP Archive</h1>
            <button id="theme-toggle" class="theme-btn">🌙</button>
            <p class="site-subtitle">XVIthk</p>
            <a href="archive.html" class="nav-button">📚 浏览完整目录</a>
        </header>

        <!-- ✨ 可切换的立体公告牌/反馈区 -->
        <div class="action-card">
            <div id="action-badge" class="action-badge default-mode">
                <span>📢</span> 公告板
            </div>
            <div id="action-content-card" class="action-content-card">
                <div id="action-content-inner" class="action-content-inner">
                    <!-- 动态内容会填充到这里 -->
                    <div class="normal-content">
                        <div class="loading-text">📡 正在加载公告...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="warning">
            <strong>⚠️ 警告</strong>: 本站内容包含成人元素，请确保您已年满18岁并自愿承担阅读风险。
        </div>

        <main>
            <ul class="works-list">
                {% for series_name, items in series_dict.items() %}
                <li class="work-item">
                    <div class="work-title">{{ series_name }}</div>
                    <ul class="chapter-list">
                        {% for item in items %}
                        <li class="chapter-item"><a href="{{ item.href }}" class="chapter-link">{{ item.display_title }}</a></li>
                        {% endfor %}
                    </ul>
                </li>
                {% endfor %}
            </ul>
        </main>

        <footer>
            <p>© 2026 XVIthk. 请理性阅读。</p>
        </footer>
    </div>

    <script>
        // ==================== 主题切换 ====================
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateButtonText(savedTheme);
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            updateButtonText('dark');
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateButtonText(newTheme);
        }
        
        function updateButtonText(theme) {
            themeToggle.textContent = theme === 'dark' ? '🌙' : '☀️';
        }
        themeToggle.addEventListener('click', toggleTheme);

        // ==================== 卡片动画延迟 ====================
        function setCardDelay() {
            const cards = document.querySelectorAll('.work-item');
            cards.forEach((card, index) => {
                card.style.setProperty('--card-index', index);
            });
        }

        // ==================== 公告/反馈切换逻辑 ====================
        // 状态管理: false = 公告模式, true = 反馈模式
        let isFeedbackMode = false;
        
        const badge = document.getElementById('action-badge');
        const contentCard = document.getElementById('action-content-card');
        const contentInner = document.getElementById('action-content-inner');
        
        // 存储原始公告内容（加载后保存）
        let originalAnnouncementHTML = null;
        
        // 加载作者的话（公告内容）
        async function loadAuthorsWords() {
            try {
                const response = await fetch('author-words.md');
                if (!response.ok) throw new Error('文件加载失败');
                const markdownText = await response.text();
                // 保存原始内容
                originalAnnouncementHTML = `<div class="normal-content">${markdownText.replace(/\n/g, '<br>')}</div>`;
                if (!isFeedbackMode) {
                    contentInner.innerHTML = originalAnnouncementHTML;
                }
            } catch (error) {
                console.error('加载作者的话时出错:', error);
                originalAnnouncementHTML = `<div class="normal-content"><p style="color: var(--text-secondary);">📭 站长今天似乎没什么要说的。</p></div>`;
                if (!isFeedbackMode) {
                    contentInner.innerHTML = originalAnnouncementHTML;
                }
            }
        }
        
        // 渲染反馈表单
        function renderFeedbackForm() {
            return `
                <div class="feedback-form">
                    <input type="text" id="feedback-name" placeholder="你的名字（可选）" maxlength="50">
                    <textarea id="feedback-message" placeholder="请写下你的反馈意见、建议或报错..." required></textarea>
                    <button id="submit-feedback">📮 提交反馈</button>
                    <small style="color: var(--text-secondary); font-size: 0.8rem;">💡 反馈会保存在浏览器本地，站长后续会看到~</small>
                </div>
            `;
        }
        
        // 保存反馈到 localStorage
        function saveFeedback(name, message) {
            const feedbacks = JSON.parse(localStorage.getItem('user_feedbacks') || '[]');
            feedbacks.push({
                name: name || '匿名',
                message: message,
                timestamp: new Date().toISOString(),
                page: window.location.pathname
            });
            localStorage.setItem('user_feedbacks', JSON.stringify(feedbacks));
        }
        
        // 显示提交成功提示
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                background: ${isError ? '#e74c3c' : 'linear-gradient(135deg, #27ae60, #2ecc71)'};
                color: white; padding: 10px 24px; border-radius: 40px;
                z-index: 1000; font-size: 0.9rem; opacity: 0;
                transition: opacity 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                white-space: nowrap;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '1', 10);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }
        
        // 绑定反馈表单提交事件
        function bindFeedbackEvents() {
            const submitBtn = document.getElementById('submit-feedback');
            if (submitBtn) {
                submitBtn.addEventListener('click', () => {
                    const nameInput = document.getElementById('feedback-name');
                    const msgTextarea = document.getElementById('feedback-message');
                    const message = msgTextarea?.value.trim();
                    
                    if (!message) {
                        showToast('请填写反馈内容~', true);
                        return;
                    }
                    
                    const name = nameInput?.value.trim() || '';
                    saveFeedback(name, message);
                    showToast('✅ 反馈已提交，感谢你的建议！');
                    
                    // 清空表单
                    if (msgTextarea) msgTextarea.value = '';
                    if (nameInput) nameInput.value = '';
                    
                    // 可选：3秒后自动切换回公告模式
                    setTimeout(() => {
                        if (isFeedbackMode) {
                            toggleMode();
                        }
                    }, 2000);
                });
            }
        }
        
        // 切换模式（带动画）
        function toggleMode() {
            isFeedbackMode = !isFeedbackMode;
            
            // 1. 切换按钮样式和位置
            if (isFeedbackMode) {
                badge.classList.remove('default-mode');
                badge.classList.add('feedback-mode');
                badge.innerHTML = '<span>📮</span> 我要反馈...';
                contentCard.classList.add('feedback-mode');
            } else {
                badge.classList.remove('feedback-mode');
                badge.classList.add('default-mode');
                badge.innerHTML = '<span>📢</span> 公告板';
                contentCard.classList.remove('feedback-mode');
            }
            
            // 2. 切换下方内容（带淡入动画）
            contentInner.style.animation = 'none';
            contentInner.offsetHeight; // 强制重绘
            
            if (isFeedbackMode) {
                contentInner.innerHTML = renderFeedbackForm();
                contentInner.style.animation = 'contentSwitch 0.3s ease-out';
                // 绑定表单事件
                setTimeout(bindFeedbackEvents, 50);
            } else {
                if (originalAnnouncementHTML) {
                    contentInner.innerHTML = originalAnnouncementHTML;
                } else {
                    contentInner.innerHTML = '<div class="normal-content"><div class="loading-text">📡 正在加载公告...</div></div>';
                    loadAuthorsWords(); // 重新加载
                }
                contentInner.style.animation = 'contentSwitch 0.3s ease-out';
            }
        }
        
        // 绑定点击事件
        badge.addEventListener('click', toggleMode);
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            loadAuthorsWords();
            setCardDelay();
        });
    </script>
</body>
</html>
