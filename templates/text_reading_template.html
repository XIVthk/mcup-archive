<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XVIthk Reader</title>
    <style>
        /* ========== 霞鹜文楷字体 ========== */
        @import url('https://cdn.jsdelivr.net/npm/lxgw-wenkai-lite-webfont@1.1.0/style.css');

        :root {
            --bg-primary-light: #f8f9fa;
            --bg-secondary-light: #ffffff;
            --text-primary-light: #2c3e50;
            --text-secondary-light: #6c757d;
            --bg-primary-dark: #0a0e17;
            --bg-secondary-dark: #141a26;
            --text-primary-dark: #e6edf3;
            --text-secondary-dark: #8b9bae;
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
            --accent-start: #3498db;
            --accent-end: #9b59b6;
            --accent: #5e72e4;
            --accent-hover: #6a7df4;
            --accent-glow: rgba(94, 114, 228, 0.3);
        }

        [data-theme="dark"] {
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
        }

        [data-theme="light"] {
            --bg-primary: var(--bg-primary-light);
            --bg-secondary: var(--bg-secondary-light);
            --text-primary: var(--text-primary-light);
            --text-secondary: var(--text-secondary-light);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'LXGW WenKai Lite', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            line-height: 1.8;
            animation: pageFade 0.4s ease-out;
            position: relative;
            min-height: 100vh;
        }

        [data-theme="dark"] body {
            background: 
                radial-gradient(circle at 20% 30%, rgba(52, 152, 219, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(155, 89, 182, 0.08) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.01) 0px, rgba(255, 255, 255, 0.01) 2px, transparent 2px, transparent 8px),
                linear-gradient(135deg, #0a0e17 0%, #0f1320 50%, #0a0e17 100%);
        }

        [data-theme="light"] body {
            background: 
                radial-gradient(circle at 20% 30%, rgba(52, 152, 219, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(155, 89, 182, 0.05) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.01) 0px, rgba(0, 0, 0, 0.01) 2px, transparent 2px, transparent 8px),
                linear-gradient(135deg, #f8f9fa 0%, #eef2f5 100%);
        }

        [data-theme="dark"] body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: radial-gradient(2px 2px at 20px 30px, rgba(255, 255, 255, 0.1), rgba(0, 0, 0, 0));
            background-size: 40px 40px;
            background-repeat: repeat;
            z-index: 0;
        }

        @keyframes pageFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
            z-index: 1001;
            transition: width 0.1s ease-out;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .reader-header {
            background-color: rgba(var(--bg-secondary), 0.85);
            padding: 0.8rem 2rem;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--text-secondary);
            z-index: 100;
            gap: 1rem;
            backdrop-filter: blur(12px);
        }

        .reader-title {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0;
            font-size: 1.2rem;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            position: relative;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            background: none;
            padding: 0;
            border-radius: 0;
            box-shadow: none;
        }

        .back-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
            transition: width 0.3s ease;
        }

        .back-link:hover::after {
            width: 100%;
        }

        .back-link:hover {
            transform: translateX(-3px);
            color: var(--accent-hover);
        }

        .dl-button {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .dl-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--accent-glow);
            filter: brightness(1.05);
        }

        .text-content-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 2rem 4rem;
            position: relative;
            z-index: 1;
            animation: contentSlideUp 0.5s ease-out;
        }

        @keyframes contentSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .markdown-body {
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .markdown-body h1 {
            font-size: 2rem;
            margin: 1.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--accent);
            color: var(--accent);
        }
        .markdown-body h2 {
            font-size: 1.6rem;
            margin: 1.2rem 0 0.8rem;
            color: var(--accent);
        }
        .markdown-body h3 {
            font-size: 1.3rem;
            margin: 1rem 0 0.6rem;
        }
        .markdown-body p {
            margin: 0.8rem 0;
        }
        .markdown-body ul, .markdown-body ol {
            margin: 0.8rem 0;
            padding-left: 2rem;
        }
        .markdown-body li {
            margin: 0.3rem 0;
        }
        .markdown-body pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .markdown-body code {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
        }
        .markdown-body blockquote {
            border-left: 4px solid var(--accent);
            margin: 1rem 0;
            padding: 0.5rem 1rem;
            background: rgba(94, 114, 228, 0.1);
            border-radius: 0 8px 8px 0;
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid var(--text-secondary);
            padding: 0.5rem;
            text-align: left;
        }
        .markdown-body th {
            background: rgba(94, 114, 228, 0.2);
        }
        .markdown-body a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px dashed var(--accent);
        }
        .markdown-body a:hover {
            color: var(--accent-hover);
            border-bottom-style: solid;
        }
        .markdown-body img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1rem 0;
        }
        .markdown-body hr {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 2rem 0;
        }

        .plain-text {
            white-space: pre-wrap;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .theme-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--text-secondary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            background: var(--accent);
            color: white;
        }

        .font-controls {
            display: flex;
            background-color: var(--bg-secondary);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--text-secondary);
        }

        .font-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .font-btn:hover {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: white;
        }

        html {
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progress-bar"></div>

    <div class="reader-header">
        <a href="../archive.html" class="back-link">← 返回目录</a>
        <h1 class="reader-title">{{ title }}</h1>
        <div class="header-controls">
            <button id="theme-toggle" class="theme-btn">🌙</button>
            <div class="font-controls">
                <button id="font-smaller" class="font-btn">A-</button>
                <button id="font-reset" class="font-btn">A</button>
                <button id="font-larger" class="font-btn">A+</button>
            </div>
            <a href="{{ pdf_url }}" class="dl-button" download>⬇️ 下载PDF</a>
        </div>
    </div>

    <div class="text-content-container" id="text-content">
        {{ content | safe }}
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateButtonText(savedTheme);
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            updateButtonText('dark');
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateButtonText(newTheme);
        }
        
        function updateButtonText(theme) {
            themeToggle.textContent = theme === 'dark' ? '🌙' : '☀️';
        }
        themeToggle.addEventListener('click', toggleTheme);

        const contentContainer = document.getElementById('text-content');
        const smallerBtn = document.getElementById('font-smaller');
        const resetBtn = document.getElementById('font-reset');
        const largerBtn = document.getElementById('font-larger');
        
        let textElement = contentContainer.querySelector('.markdown-body') || contentContainer.querySelector('.plain-text') || contentContainer;
        
        let fontSize = parseInt(localStorage.getItem('readerFontSize')) || 18;
        
        function applyFontSize() {
            if (textElement) {
                textElement.style.fontSize = fontSize + 'px';
            }
        }
        
        function adjustFontSize(change) {
            fontSize += change;
            fontSize = Math.max(14, Math.min(28, fontSize));
            applyFontSize();
            localStorage.setItem('readerFontSize', fontSize);
            contentContainer.style.transform = 'scale(1.01)';
            setTimeout(() => { contentContainer.style.transform = ''; }, 200);
        }
        
        smallerBtn.addEventListener('click', () => adjustFontSize(-2));
        largerBtn.addEventListener('click', () => adjustFontSize(2));
        resetBtn.addEventListener('click', () => {
            fontSize = 18;
            applyFontSize();
            localStorage.setItem('readerFontSize', fontSize);
        });
        
        applyFontSize();

        function updateProgressBar() {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = 0;
            if (height > 0) {
                scrolled = Math.min(100, Math.max(0, (winScroll / height) * 100));
            }
            document.getElementById('progress-bar').style.width = scrolled + '%';
        }
        
        function saveReadingProgress() {
            const scrollPosition = window.scrollY;
            const pageHeight = document.body.scrollHeight - window.innerHeight;
            if (pageHeight <= 0) return;
            let percentage = Math.min(100, Math.max(0, Math.round((scrollPosition / pageHeight) * 100)));
            localStorage.setItem('progress_' + window.location.pathname, percentage);
        }
        
        function restoreReadingProgress() {
            const savedProgress = localStorage.getItem('progress_' + window.location.pathname);
            if (savedProgress && savedProgress !== '0') {
                let progress = parseInt(savedProgress);
                progress = Math.min(100, Math.max(0, progress));
                setTimeout(() => {
                    const pageHeight = document.body.scrollHeight - window.innerHeight;
                    if (pageHeight > 0 && progress > 0 && progress < 100) {
                        window.scrollTo({ top: (progress / 100) * pageHeight, behavior: 'smooth' });
                        const toast = document.createElement('div');
                        toast.textContent = `📖 已恢复至 ${progress}% 处`;
                        toast.style.cssText = `
                            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
                            color: white; padding: 8px 20px; border-radius: 30px;
                            z-index: 1000; font-size: 0.9rem; opacity: 0;
                            transition: opacity 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                        `;
                        document.body.appendChild(toast);
                        setTimeout(() => toast.style.opacity = '1', 10);
                        setTimeout(() => {
                            toast.style.opacity = '0';
                            setTimeout(() => toast.remove(), 300);
                        }, 2500);
                    }
                }, 200);
            }
        }
        
        let saveTimeout;
        window.addEventListener('scroll', () => {
            updateProgressBar();
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveReadingProgress, 800);
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            updateProgressBar();
            restoreReadingProgress();
        });
    </script>
</body>
</html>
