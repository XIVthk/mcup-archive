<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XVIthk Reader</title>
    <style>
        :root {
            --bg-primary-light: #f8f9fa;
            --bg-secondary-light: #ffffff;
            --text-primary-light: #2c3e50;
            --text-secondary-light: #6c757d;
            --bg-primary-dark: #0a0e17;
            --bg-secondary-dark: #141a26;
            --text-primary-dark: #e6edf3;
            --text-secondary-dark: #8b9bae;
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
            --accent-start: #3498db;
            --accent-end: #9b59b6;
            --accent: #5e72e4;
            --accent-hover: #6a7df4;
            --accent-glow: rgba(94, 114, 228, 0.3);
        }

        [data-theme="dark"] {
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
        }

        [data-theme="light"] {
            --bg-primary: var(--bg-primary-light);
            --bg-secondary: var(--bg-secondary-light);
            --text-primary: var(--text-primary-light);
            --text-secondary: var(--text-secondary-light);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== 动态大背景（与首页一致） ========== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            line-height: 1.8;
            animation: pageFade 0.4s ease-out;
            position: relative;
            min-height: 100vh;
        }

        [data-theme="dark"] body {
            background: 
                radial-gradient(circle at 20% 30%, rgba(52, 152, 219, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(155, 89, 182, 0.08) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.01) 0px, rgba(255, 255, 255, 0.01) 2px, transparent 2px, transparent 8px),
                linear-gradient(135deg, #0a0e17 0%, #0f1320 50%, #0a0e17 100%);
        }

        [data-theme="light"] body {
            background: 
                radial-gradient(circle at 20% 30%, rgba(52, 152, 219, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(155, 89, 182, 0.05) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.01) 0px, rgba(0, 0, 0, 0.01) 2px, transparent 2px, transparent 8px),
                linear-gradient(135deg, #f8f9fa 0%, #eef2f5 100%);
        }

        [data-theme="dark"] body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: radial-gradient(2px 2px at 20px 30px, rgba(255, 255, 255, 0.1), rgba(0, 0, 0, 0));
            background-size: 40px 40px;
            background-repeat: repeat;
            z-index: 0;
        }

        @keyframes pageFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 阅读进度条 */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
            z-index: 1001;
            transition: width 0.15s ease-out;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .reader-header {
            background-color: rgba(var(--bg-secondary), 0.9);
            backdrop-filter: blur(10px);
            padding: 0.8rem 2rem;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--text-secondary);
            z-index: 100;
            gap: 1rem;
        }

        .reader-title {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0;
            font-size: 1.2rem;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .dl-button, .back-link {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .dl-button:hover, .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--accent-glow);
            filter: brightness(1.05);
        }

        .text-content-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 2rem 4rem;
            white-space: pre-wrap;
            text-align: left;
            font-size: 1.1rem;
            line-height: 1.8;
            animation: contentSlideUp 0.5s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes contentSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .theme-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--text-secondary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            background: var(--accent);
            color: white;
        }

        .font-controls {
            display: flex;
            background-color: var(--bg-secondary);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--text-secondary);
        }

        .font-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .font-btn:hover {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: white;
        }

        /* 加载动画 */
        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .loading-spinner::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            margin-left: 10px;
            border: 2px solid var(--accent);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover);
        }

        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <!-- 阅读进度条 -->
    <div class="progress-bar" id="progress-bar"></div>

    <div class="reader-header">
        <a href="../archive.html" class="back-link">← 返回目录</a>
        <h1 class="reader-title">{{ title }}</h1>
        <div class="header-controls">
            <button id="theme-toggle" class="theme-btn">🌙</button>
            <div class="font-controls">
                <button id="font-smaller" class="font-btn">A-</button>
                <button id="font-reset" class="font-btn">A</button>
                <button id="font-larger" class="font-btn">A+</button>
            </div>
            <a href="{{ pdf_url }}" class="dl-button" download>⬇️ 下载PDF</a>
        </div>
    </div>

    <div class="text-content-container" id="text-content">
        <div class="loading-spinner">📖 正在加载内容</div>
    </div>

    <script>
        // ========== 主题切换 ==========
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateButtonText(savedTheme);
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            updateButtonText('dark');
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateButtonText(newTheme);
        }
        
        function updateButtonText(theme) {
            themeToggle.textContent = theme === 'dark' ? '🌙' : '☀️';
        }
        themeToggle.addEventListener('click', toggleTheme);

        // ========== 字体大小控制 ==========
        const contentElement = document.getElementById('text-content');
        let fontSize = parseInt(localStorage.getItem('readerFontSize')) || 18;
        
        function applyFontSize() {
            contentElement.style.fontSize = fontSize + 'px';
        }
        
        function adjustFontSize(change) {
            fontSize += change;
            fontSize = Math.max(14, Math.min(28, fontSize));
            applyFontSize();
            localStorage.setItem('readerFontSize', fontSize);
            // 字体变化微动画
            contentElement.style.transform = 'scale(1.01)';
            setTimeout(() => { contentElement.style.transform = ''; }, 200);
        }
        
        // ========== 进度条更新 ==========
        function updateProgressBar() {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById('progress-bar').style.width = scrolled + '%';
        }
        window.addEventListener('scroll', updateProgressBar);

        // ========== 显示 Toast 提示 ==========
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) scale(0.9);
                background: ${isError ? 'linear-gradient(135deg, #e74c3c, #c0392b)' : 'linear-gradient(135deg, var(--accent-start), var(--accent-end))'};
                color: white; padding: 10px 24px; border-radius: 40px;
                z-index: 1000; font-size: 0.9rem; opacity: 0;
                transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                backdrop-filter: blur(4px); white-space: nowrap;
            `;
            document.body.appendChild(toast);
            // 入场动画
            setTimeout(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateX(-50%) scale(1)';
            }, 10);
            // 自动消失
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) scale(0.9)';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // ========== 阅读进度保存（节流） ==========
        let saveTimeout;
        function saveReadingProgress() {
            const scrollPosition = window.scrollY;
            const pageHeight = document.body.scrollHeight - window.innerHeight;
            if (pageHeight <= 0) return;
            const percentage = Math.round((scrollPosition / pageHeight) * 100);
            const pageKey = 'progress_' + window.location.pathname;
            localStorage.setItem(pageKey, percentage);
        }
        
        window.addEventListener('scroll', () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveReadingProgress, 800);
        });

        // ========== 恢复阅读进度（关键修复：等内容加载完再恢复） ==========
        let hasRestored = false;
        
        function restoreReadingProgress() {
            if (hasRestored) return;
            
            const pageKey = 'progress_' + window.location.pathname;
            const savedProgress = localStorage.getItem(pageKey);
            
            if (savedProgress !== null) {
                const pageHeight = document.body.scrollHeight - window.innerHeight;
                if (pageHeight <= 0) {
                    // 内容还没完全渲染，稍后重试
                    setTimeout(restoreReadingProgress, 200);
                    return;
                }
                const scrollPosition = (savedProgress / 100) * pageHeight;
                window.scrollTo({ top: scrollPosition, behavior: 'smooth' });
                showToast(`📖 已恢复至 ${savedProgress}%`);
                hasRestored = true;
            }
        }

        // ========== 加载文本内容 ==========
        async function loadContent() {
            const contentDiv = document.getElementById('text-content');
            
            try {
                const response = await fetch("{{ txt_url }}");
                if (!response.ok) throw new Error('网络响应异常');
                const text = await response.text();
                
                // 清空并填入内容
                contentDiv.innerHTML = '';
                contentDiv.innerText = text;
                applyFontSize();
                
                // 内容加载完成后，恢复阅读进度
                setTimeout(restoreReadingProgress, 100);
                
            } catch (error) {
                console.error('加载文本失败:', error);
                contentDiv.innerHTML = `
                    <div style="text-align: center; padding: 3rem;">
                        <p style="color: lightcoral;">❌ 加载失败</p>
                        <p>请<a href="{{ pdf_url }}" download style="color: var(--accent);">下载PDF</a>阅读</p>
                    </div>
                `;
                showToast('内容加载失败', true);
            }
        }

        // ========== 绑定字体按钮 ==========
        const smallerBtn = document.getElementById('font-smaller');
        const resetBtn = document.getElementById('font-reset');
        const largerBtn = document.getElementById('font-larger');
        
        smallerBtn.addEventListener('click', () => adjustFontSize(-2));
        largerBtn.addEventListener('click', () => adjustFontSize(2));
        resetBtn.addEventListener('click', () => {
            fontSize = 18;
            applyFontSize();
            localStorage.setItem('readerFontSize', fontSize);
            showToast('字体已重置');
        });

        // ========== 页面启动 ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadContent();
        });
    </script>
</body>
</html>
