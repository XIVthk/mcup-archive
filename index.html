<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCUP Archive - XVIthk</title>
    <style>
        :root {
            --bg-primary-light: #f8f9fa;
            --bg-secondary-light: #ffffff;
            --text-primary-light: #2c3e50;
            --text-secondary-light: #6c757d;
            --bg-primary-dark: #0a0e17;
            --bg-secondary-dark: #141a26;
            --text-primary-dark: #e6edf3;
            --text-secondary-dark: #8b9bae;
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
            --accent-start: #3498db;
            --accent-end: #9b59b6;
            --accent: #5e72e4;
            --accent-hover: #6a7df4;
            --accent-glow: rgba(94, 114, 228, 0.25);
            --card-radius: 16px;
            /* 番茄红 🍅 */
            --tomato-start: #ff6b6b;
            --tomato-end: #ee5a24;
        }

        [data-theme="dark"] {
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
        }

        [data-theme="light"] {
            --bg-primary: var(--bg-primary-light);
            --bg-secondary: var(--bg-secondary-light);
            --text-primary: var(--text-primary-light);
            --text-secondary: var(--text-secondary-light);
            --accent-glow: rgba(94, 114, 228, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            animation: pageFadeIn 0.5s ease-out;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--text-secondary);
            position: relative;
        }

        .site-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .site-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .warning {
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.08), rgba(155, 89, 182, 0.08));
            border-left: 4px solid var(--accent);
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: 0 12px 12px 0;
            backdrop-filter: blur(4px);
        }

        .works-list {
            list-style: none;
        }

        .work-item {
            background-color: var(--bg-secondary);
            border-radius: var(--card-radius);
            margin-bottom: 1.5rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(var(--text-secondary), 0.2);
            opacity: 0;
            transform: translateY(30px);
            animation: cardReveal 0.5s ease-out forwards;
            animation-delay: calc(var(--card-index, 0) * 0.08s);
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .work-item:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            border-color: var(--accent);
        }

        .work-item:hover .work-title {
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.15), rgba(155, 89, 182, 0.15));
        }

        .work-title {
            padding: 1.2rem;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid rgba(var(--text-secondary), 0.3);
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            transition: background 0.3s ease;
        }

        .work-title::before {
            content: "📖";
            margin-right: 0.8rem;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .work-item:hover .work-title::before {
            transform: scale(1.1) rotate(5deg);
        }

        .chapter-list {
            list-style: none;
            padding: 0.5rem 0;
        }

        .chapter-item {
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid rgba(var(--text-secondary), 0.15);
            transition: all 0.25s ease;
        }

        .chapter-item:hover {
            background: var(--accent-glow);
            padding-left: 1.6rem;
        }

        .chapter-item:last-child {
            border-bottom: none;
        }

        .chapter-link {
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.25s ease;
        }

        .chapter-link:hover {
            color: var(--accent-hover);
        }

        .chapter-link::before {
            content: "→";
            margin-right: 0.8rem;
            color: var(--accent);
            font-weight: bold;
            transition: transform 0.25s ease;
        }

        .chapter-link:hover::before {
            transform: translateX(4px);
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .container { padding: 1.5rem; }
            .site-title { font-size: 2rem; }
        }

        .nav-button {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            text-decoration: none;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px var(--accent-glow);
            filter: brightness(1.05);
        }

        .theme-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--text-secondary);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            background: var(--accent);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* ==================== 🎯 立体悬浮按钮 ==================== */
        .author-words {
            background-color: var(--bg-secondary);
            border-left: 4px solid var(--accent);
            border-radius: var(--card-radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            position: relative;
            transition: all 0.3s ease;
            min-height: 120px;
        }

        .author-words:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 30px rgba(0, 0, 0, 0.2);
        }

        /* 🎯 立体悬浮按钮 - 独立于大框，可移动 */
        .floating-badge {
            position: absolute;
            top: -14px;
            left: 20px;
            padding: 6px 18px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            z-index: 20;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            transition: all 0.45s cubic-bezier(0.34, 1.2, 0.64, 1);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 3D 立体效果 */
        .floating-badge::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.15);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .floating-badge:hover::before {
            opacity: 1;
        }

        /* 默认状态 - 渐变蓝紫 */
        .floating-badge.default {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: white;
            left: 20px;
            top: -14px;
            right: auto;
            bottom: auto;
        }

        /* 反馈状态 - 番茄红，移动到右下角 */
        .floating-badge.feedback {
            background: linear-gradient(135deg, var(--tomato-start), var(--tomato-end));
            color: white;
            left: auto;
            right: 20px;
            top: auto;
            bottom: -14px;
        }

        /* 悬停动画 - 上下浮动 + 发光 */
        .floating-badge:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35), 0 0 0 2px rgba(255, 255, 255, 0.2) inset;
        }

        .floating-badge.feedback:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 28px rgba(238, 90, 36, 0.4), 0 0 0 2px rgba(255, 255, 255, 0.2) inset;
        }

        /* 点击波纹效果 */
        .floating-badge:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }

        .author-content {
            white-space: pre-line;
            line-height: 1.6;
            animation: contentFadeIn 0.5s ease-out;
        }

        /* 反馈模式下的作者的话区域样式变化 */
        .author-words.feedback-mode {
            border-left-color: var(--tomato-start);
            background: linear-gradient(135deg, 
                rgba(255, 107, 107, 0.05), 
                rgba(238, 90, 36, 0.02));
        }

        .feedback-placeholder {
            text-align: center;
            color: var(--text-secondary);
            padding: 1rem;
            font-style: italic;
        }

        @keyframes contentFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-text {
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* 平滑过渡 */
        body, .container, header, footer, 
        .work-item, .work-title, .chapter-item,
        .author-words, .warning, .theme-btn, .nav-button {
            transition: background-color 0.4s ease-in-out, 
                        color 0.4s ease-in-out, 
                        border-color 0.4s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="site-title">MCUP Archive</h1>
            <button id="theme-toggle" class="theme-btn">🌙</button>
            <p class="site-subtitle">XVIthk</p>
            <a href="archive.html" class="nav-button">📚 浏览完整目录</a>
        </header>

        <!-- 🎯 作者的话区域 - 带可移动立体按钮 -->
        <section class="author-words" id="author-words-container">
            <!-- 立体悬浮按钮 - 独立元素 -->
            <div id="floating-badge" class="floating-badge default">
                <span>📢</span> 公告板
            </div>
            <div class="loading-text" id="author-loading">正在加载作者的最新唠叨...</div>
            <div id="author-content" style="display: none;"></div>
        </section>

        <div class="warning">
            <strong>⚠️ 警告</strong>: 本站内容包含成人元素，请确保您已年满18岁并自愿承担阅读风险。
        </div>

        <main>
            <ul class="works-list">
                
                <li class="work-item">
                    <div class="work-title">妄想症Paranoia</div>
                    <ul class="chapter-list">
                        
                        <li class="chapter-item"><a href="reading/妄想症_01_BadCen.html" class="chapter-link">妄想症#01 - Cen</a></li>
                        
                        <li class="chapter-item"><a href="reading/妄想症_02_swk_bc.html" class="chapter-link">妄想症#02 - 孙悟空、空城</a></li>
                        
                        <li class="chapter-item"><a href="reading/妄想症_03_xty.html" class="chapter-link">妄想症#03 - 夏天y</a></li>
                        
                    </ul>
                </li>
                
            </ul>
        </main>

        <footer>
            <p>© 2026 XVIthk. 请理性阅读。</p>
        </footer>
    </div>

    <script>
        // ==================== 主题切换 ====================
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateButtonText(savedTheme);
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            updateButtonText('dark');
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateButtonText(newTheme);
        }
        
        function updateButtonText(theme) {
            themeToggle.textContent = theme === 'dark' ? '🌙' : '☀️';
        }
        themeToggle.addEventListener('click', toggleTheme);

        // ==================== 🎯 立体按钮切换逻辑 ====================
        let isFeedbackMode = false;
        const badge = document.getElementById('floating-badge');
        const authorContainer = document.getElementById('author-words-container');
        const authorContentDiv = document.getElementById('author-content');
        const authorLoading = document.getElementById('author-loading');
        
        // 存储原始作者的话内容
        let originalAuthorHTML = '';
        
        // 反馈链接（你可以替换成你自己的反馈表单链接）
        const FEEDBACK_URL = 'https://github.com/yourname/yourrepo/issues/new'; // 修改这里！
        
        // 加载作者的话
        async function loadAuthorsWords() {
            try {
                const response = await fetch('author-words.md');
                if (!response.ok) throw new Error('文件加载失败');
                const markdownText = await response.text();
                originalAuthorHTML = markdownText.replace(/\n/g, '<br>');
                authorContentDiv.innerHTML = originalAuthorHTML;
                authorLoading.style.display = 'none';
                authorContentDiv.style.display = 'block';
            } catch (error) {
                console.error('加载作者的话时出错:', error);
                authorLoading.textContent = '站长今天似乎没什么要说的。';
                originalAuthorHTML = '<p>站长今天似乎没什么要说的。</p>';
            }
        }
        
        // 切换到反馈模式
        function switchToFeedbackMode() {
            // 改变按钮样式和位置
            badge.classList.remove('default');
            badge.classList.add('feedback');
            badge.innerHTML = '<span>💬</span> 我要反馈…';
            
            // 改变下方大框的样式
            authorContainer.classList.add('feedback-mode');
            
            // 替换内容为反馈提示
            authorLoading.style.display = 'none';
            authorContentDiv.style.display = 'block';
            authorContentDiv.innerHTML = `
                <div class="feedback-placeholder">
                    ✨ 感谢你的反馈！ ✨<br><br>
                    📝 请点击上方「我要反馈…」按钮，<br>
                    或直接<a href="${FEEDBACK_URL}" target="_blank" style="color: var(--tomato-start);">点击这里</a>前往反馈页面。<br><br>
                    <small>你的建议会让这个站点变得更好 🍅</small>
                </div>
            `;
        }
        
        // 切换回默认模式
        function switchToDefaultMode() {
            // 恢复按钮样式和位置
            badge.classList.remove('feedback');
            badge.classList.add('default');
            badge.innerHTML = '<span>📢</span> 公告板';
            
            // 恢复大框样式
            authorContainer.classList.remove('feedback-mode');
            
            // 恢复原始内容
            authorLoading.style.display = 'none';
            authorContentDiv.style.display = 'block';
            authorContentDiv.innerHTML = originalAuthorHTML;
        }
        
        // 按钮点击事件 - 切换模式
        function toggleMode() {
            if (isFeedbackMode) {
                switchToDefaultMode();
                isFeedbackMode = false;
            } else {
                switchToFeedbackMode();
                isFeedbackMode = true;
            }
        }
        
        // 为卡片添加动画延迟索引
        function setCardDelay() {
            const cards = document.querySelectorAll('.work-item');
            cards.forEach((card, index) => {
                card.style.setProperty('--card-index', index);
            });
        }
        
        // 监听按钮点击（包括通过点击反馈链接内的触发）
        badge.addEventListener('click', toggleMode);
        
        // 如果用户点击了反馈内容中的链接，模式不变，正常跳转
        
        document.addEventListener('DOMContentLoaded', function() {
            loadAuthorsWords();
            setCardDelay();
        });
    </script>
</body>
</html>
