<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCUP Archive - XVIthk</title>
    <style>
        /* ========== 霞鹜文楷字体 ========== */
        @import url('https://cdn.jsdelivr.net/npm/lxgw-wenkai-lite-webfont@1.1.0/style.css');

        :root {
            --bg-primary-light: #f8f9fa;
            --bg-secondary-light: #ffffff;
            --text-primary-light: #2c3e50;
            --text-secondary-light: #6c757d;
            --bg-primary-dark: #0a0e17;
            --bg-secondary-dark: #141a26;
            --text-primary-dark: #e6edf3;
            --text-secondary-dark: #8b9bae;
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
            --accent-start: #3498db;
            --accent-end: #9b59b6;
            --accent: #5e72e4;
            --accent-hover: #6a7df4;
            --accent-glow: rgba(94, 114, 228, 0.25);
            --card-radius: 16px;
        }

        [data-theme="dark"] {
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
        }

        [data-theme="light"] {
            --bg-primary: var(--bg-primary-light);
            --bg-secondary: var(--bg-secondary-light);
            --text-primary: var(--text-primary-light);
            --text-secondary: var(--text-secondary-light);
            --accent-glow: rgba(94, 114, 228, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'LXGW WenKai Lite', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            animation: pageFadeIn 0.5s ease-out;
            position: relative;
        }

        [data-theme="dark"] body {
            background: 
                radial-gradient(circle at 20% 30%, rgba(52, 152, 219, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(155, 89, 182, 0.08) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.01) 0px, rgba(255, 255, 255, 0.01) 2px, transparent 2px, transparent 8px),
                linear-gradient(135deg, #0a0e17 0%, #0f1320 50%, #0a0e17 100%);
        }

        [data-theme="light"] body {
            background: 
                radial-gradient(circle at 20% 30%, rgba(52, 152, 219, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(155, 89, 182, 0.05) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.01) 0px, rgba(0, 0, 0, 0.01) 2px, transparent 2px, transparent 8px),
                linear-gradient(135deg, #f8f9fa 0%, #eef2f5 100%);
        }

        [data-theme="dark"] body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: radial-gradient(2px 2px at 20px 30px, rgba(255, 255, 255, 0.1), rgba(0, 0, 0, 0));
            background-size: 40px 40px;
            background-repeat: repeat;
            z-index: 0;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--text-secondary);
            position: relative;
        }

        .site-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .site-title-link {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-decoration: none;
            position: relative;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .site-title-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .site-title-link:hover::after {
            width: 100%;
        }

        .site-title-link:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .site-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .warning {
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.08), rgba(155, 89, 182, 0.08));
            border-left: 4px solid var(--accent);
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: 0 12px 12px 0;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: warningPulse 2s ease-in-out infinite;
        }

        @keyframes warningPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(94, 114, 228, 0.2);
                border-left-width: 4px;
            }
            50% {
                box-shadow: 0 0 0 6px rgba(94, 114, 228, 0.05);
                border-left-width: 5px;
            }
        }

        .warning:hover {
            transform: translateX(4px);
            animation: none;
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.15), rgba(155, 89, 182, 0.15));
            border-left-width: 6px;
            box-shadow: 0 4px 12px rgba(94, 114, 228, 0.2);
        }

        .warning::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
            pointer-events: none;
        }

        .warning:hover::before {
            left: 100%;
        }

        .works-list {
            list-style: none;
        }

        .work-item {
            background-color: var(--bg-secondary);
            border-radius: var(--card-radius);
            margin-bottom: 1.5rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(var(--text-secondary), 0.2);
            opacity: 0;
            transform: translateY(30px);
            animation: cardReveal 0.5s ease-out forwards;
            animation-delay: calc(var(--card-index, 0) * 0.08s);
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .work-item:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            border-color: var(--accent);
        }

        .work-item:hover .work-title {
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.15), rgba(155, 89, 182, 0.15));
        }

        .work-title {
            padding: 1.2rem;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid rgba(var(--text-secondary), 0.3);
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            transition: background 0.3s ease;
        }

        .work-title::before {
            content: "📖";
            margin-right: 0.8rem;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .work-item:hover .work-title::before {
            transform: scale(1.1) rotate(5deg);
        }

        .chapter-list {
            list-style: none;
            padding: 0.5rem 0;
        }

        .chapter-item {
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid rgba(var(--text-secondary), 0.15);
            transition: all 0.25s ease;
        }

        .chapter-item:hover {
            background: var(--accent-glow);
            padding-left: 1.6rem;
        }

        .chapter-item:last-child {
            border-bottom: none;
        }

        .chapter-link {
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.25s ease;
        }

        .chapter-link:hover {
            color: var(--accent-hover);
        }

        .chapter-link::before {
            content: "→";
            margin-right: 0.8rem;
            color: var(--accent);
            font-weight: bold;
            transition: transform 0.25s ease;
        }

        .chapter-link:hover::before {
            transform: translateX(4px);
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .container { padding: 1.5rem; }
            .site-title { font-size: 2rem; }
        }

        .nav-button {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            text-decoration: none;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px var(--accent-glow);
            filter: brightness(1.05);
        }

        .theme-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--text-secondary);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            background: var(--accent);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* 立体公告牌 */
        .notice-board {
            box-shadow: 
                0 1px 0 rgba(255, 255, 255, 0.08) inset,
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 8px 0 rgba(0, 0, 0, 0.3),
                0 12px 20px rgba(0, 0, 0, 0.4);
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            border-radius: 0px;
            margin-bottom: 2rem;
            position: relative;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow: hidden;
        }

        .notice-board:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 1px 0 rgba(255, 255, 255, 0.1) inset,
                0 0 0 1px rgba(255, 255, 255, 0.08) inset,
                0 12px 0 rgba(0, 0, 0, 0.3),
                0 20px 30px rgba(0, 0, 0, 0.5);
        }

        .notice-board-inner {
            position: relative;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            border-bottom: 1px solid rgba(94, 114, 228, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(2px);
        }

        .notice-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
            animation: iconBounce 2s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-3px) rotate(5deg); }
        }

        .notice-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, #f0f0f0, #c0c0c0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .notice-glow {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(94, 114, 228, 0.3), 
                rgba(155, 89, 182, 0.3),
                transparent
            );
            transition: left 0.6s ease;
            pointer-events: none;
        }

        .notice-board:hover .notice-glow {
            left: 100%;
        }

        .notice-content {
            padding: 1.5rem;
            background: rgba(10, 14, 23, 0.6);
            backdrop-filter: blur(4px);
            border-top: 1px solid rgba(94, 114, 228, 0.2);
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .notice-board:hover .notice-content {
            background: rgba(10, 14, 23, 0.8);
        }

        .loading-text {
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .author-content {
            white-space: pre-line;
            line-height: 1.7;
        }

        .author-content p {
            margin-bottom: 0.8rem;
        }

        .author-content a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px dashed var(--accent);
        }

        .author-content a:hover {
            color: var(--accent-hover);
            border-bottom-style: solid;
        }

        [data-theme="light"] .notice-board {
            background: linear-gradient(135deg, #e8eef4 0%, #dce3ec 50%, #d0d8e4 100%);
            box-shadow: 
                0 1px 0 rgba(255, 255, 255, 0.5) inset,
                0 0 0 1px rgba(255, 255, 255, 0.3) inset,
                0 8px 0 rgba(0, 0, 0, 0.15),
                0 12px 20px rgba(0, 0, 0, 0.1);
        }

        [data-theme="light"] .notice-board-inner {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.03) 0%, rgba(0, 0, 0, 0.01) 100%);
            border-bottom: 1px solid rgba(94, 114, 228, 0.5);
        }

        [data-theme="light"] .notice-title {
            background: linear-gradient(135deg, #2c3e50, #4a627a);
            background-clip: text;
            -webkit-background-clip: text;
        }

        [data-theme="light"] .notice-content {
            background: rgba(240, 245, 250, 0.7);
        }

        [data-theme="light"] .notice-board:hover .notice-content {
            background: rgba(240, 245, 250, 0.9);
        }

        body, .container, header, footer, 
        .work-item, .work-title, .chapter-item,
        .notice-board, .warning, .theme-btn, .nav-button {
            transition: background-color 0.4s ease-in-out, 
                        color 0.4s ease-in-out, 
                        border-color 0.4s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="site-title">
                <a href="https://xviithk.lofter.com/" target="_blank" rel="noopener noreferrer" class="site-title-link">MCUP Archive</a>
            </h1>
            <button id="theme-toggle" class="theme-btn">🌙</button>
            <p class="site-subtitle">
                <a href="https://xviithk.lofter.com/" target="_blank" rel="noopener noreferrer" class="site-title-link" style="font-size: 1.1rem;">XVIthk</a>
            </p>
            <a href="archive.html" class="nav-button">📚 浏览完整目录</a>
        </header>

        <div class="notice-board">
            <div class="notice-board-inner">
                <div class="notice-icon">📢</div>
                <h3 class="notice-title">公告板</h3>
                <div class="notice-glow"></div>
            </div>
            <div class="notice-content" id="author-words-container">
                <div class="loading-text">正在加载...</div>
            </div>
        </div>

        <div class="warning">
            <strong>⚠️ 警告</strong>: 本站内容包含成人元素，请确保您已年满18岁并自愿承担阅读风险。
        </div>

        <main>
            <ul class="works-list">
                
                <li class="work-item">
                    <div class="work-title">妄想症Paranoia</div>
                    <ul class="chapter-list">
                        
                        <li class="chapter-item"><a href="reading/妄想症_01_BadCen.html" class="chapter-link">妄想症#01 - Cen</a></li>
                        
                        <li class="chapter-item"><a href="reading/妄想症_02_swk_bc.html" class="chapter-link">妄想症#02 - 孙悟空、半城</a></li>
                        
                        <li class="chapter-item"><a href="reading/妄想症_03_xty.html" class="chapter-link">妄想症#03 - 夏天y</a></li>
                        
                        <li class="chapter-item"><a href="reading/妄想症_04_xty.html" class="chapter-link">妄想症#04 - 夏天y</a></li>
                        
                        <li class="chapter-item"><a href="reading/妄想症_05_五歌.html" class="chapter-link">妄想症#05 - 五歌</a></li>
                        
                        <li class="chapter-item"><a href="reading/妄想症_06_wsd.html" class="chapter-link">妄想症#06 - 王少栋</a></li>
                        
                    </ul>
                </li>
                
            </ul>
        </main>

        <footer>
            <p>© 2026 XVIthk. 请理性阅读。</p>
        </footer>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateButtonText(savedTheme);
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            updateButtonText('dark');
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateButtonText(newTheme);
        }
        
        function updateButtonText(theme) {
            themeToggle.textContent = theme === 'dark' ? '🌙' : '☀️';
        }
        
        themeToggle.addEventListener('click', toggleTheme);

        async function loadAuthorsWords() {
            try {
                const response = await fetch('author-words.md');
                if (!response.ok) throw new Error('文件加载失败');
                const markdownText = await response.text();
                const container = document.getElementById('author-words-container');
                const loadingDiv = container.querySelector('.loading-text');
                loadingDiv.style.display = 'none';
                const contentDiv = document.createElement('div');
                contentDiv.className = 'author-content';
                contentDiv.innerHTML = markdownText.replace(/\n/g, '<br>');
                container.appendChild(contentDiv);
            } catch (error) {
                console.error('加载作者的话时出错:', error);
                const container = document.getElementById('author-words-container');
                container.querySelector('.loading-text').textContent = '站长今天似乎没什么要说的。';
            }
        }

        function setCardDelay() {
            const cards = document.querySelectorAll('.work-item');
            cards.forEach((card, index) => {
                card.style.setProperty('--card-index', index);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadAuthorsWords();
            setCardDelay();
        });
    </script>
</body>
</html>
