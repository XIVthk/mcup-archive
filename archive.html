<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品目录 - XVIthk</title>
    <style>
        /* ========== 霞鹜文楷字体 ========== */
        @import url('https://cdn.jsdelivr.net/npm/lxgw-wenkai-lite-webfont@1.1.0/style.css');

        :root {
            --bg-primary-light: #f8f9fa;
            --bg-secondary-light: #ffffff;
            --text-primary-light: #2c3e50;
            --text-secondary-light: #6c757d;
            --bg-primary-dark: #0a0e17;
            --bg-secondary-dark: #141a26;
            --text-primary-dark: #e6edf3;
            --text-secondary-dark: #8b9bae;
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
            --accent-start: #3498db;
            --accent-end: #9b59b6;
            --accent: #5e72e4;
            --accent-hover: #6a7df4;
            --accent-glow: rgba(94, 114, 228, 0.3);
        }

        [data-theme="dark"] {
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
        }

        [data-theme="light"] {
            --bg-primary: var(--bg-primary-light);
            --bg-secondary: var(--bg-secondary-light);
            --text-primary: var(--text-primary-light);
            --text-secondary: var(--text-secondary-light);
            --accent-glow: rgba(94, 114, 228, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'LXGW WenKai Lite', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-primary);
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
            animation: pageFadeIn 0.5s ease-out;
            position: relative;
            min-height: 100vh;
        }

        [data-theme="dark"] body {
            background: 
                radial-gradient(circle at 20% 30%, rgba(52, 152, 219, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(155, 89, 182, 0.08) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.01) 0px, rgba(255, 255, 255, 0.01) 2px, transparent 2px, transparent 8px),
                linear-gradient(135deg, #0a0e17 0%, #0f1320 50%, #0a0e17 100%);
        }

        [data-theme="light"] body {
            background: 
                radial-gradient(circle at 20% 30%, rgba(52, 152, 219, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(155, 89, 182, 0.05) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.01) 0px, rgba(0, 0, 0, 0.01) 2px, transparent 2px, transparent 8px),
                linear-gradient(135deg, #f8f9fa 0%, #eef2f5 100%);
        }

        [data-theme="dark"] body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: radial-gradient(2px 2px at 20px 30px, rgba(255, 255, 255, 0.1), rgba(0, 0, 0, 0));
            background-size: 40px 40px;
            background-repeat: repeat;
            z-index: 0;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h1 {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: var(--accent);
            text-decoration: none;
            position: relative;
            transition: all 0.3s ease;
        }

        .back-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
            transition: width 0.3s ease;
        }

        .back-link:hover::after {
            width: 100%;
        }

        .back-link:hover {
            transform: translateX(-4px);
            color: var(--accent-hover);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--bg-secondary);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(var(--text-secondary), 0.2);
        }

        th {
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.1), rgba(155, 89, 182, 0.1));
            font-weight: 600;
        }

        tbody tr {
            transition: all 0.25s ease;
            animation: fadeInScale 0.4s ease-out backwards;
            animation-delay: calc(var(--row-index, 0) * 0.03s);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        tbody tr:hover {
            background: var(--accent-glow);
            transform: translateX(4px);
        }

        .chapter-link {
            color: var(--accent);
            text-decoration: none;
            position: relative;
            transition: all 0.3s ease;
        }

        .chapter-link:hover {
            color: var(--accent-hover);
            letter-spacing: 0.5px;
        }

        .theme-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--text-secondary);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 10;
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            background: var(--accent);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .warning {
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.08), rgba(155, 89, 182, 0.08));
            border-left: 4px solid var(--accent);
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: 0 12px 12px 0;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: warningPulse 2s ease-in-out infinite;
        }

        @keyframes warningPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(94, 114, 228, 0.2);
                border-left-width: 4px;
            }
            50% {
                box-shadow: 0 0 0 6px rgba(94, 114, 228, 0.05);
                border-left-width: 5px;
            }
        }

        .warning:hover {
            transform: translateX(4px);
            animation: none;
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.15), rgba(155, 89, 182, 0.15));
            border-left-width: 6px;
            box-shadow: 0 4px 12px rgba(94, 114, 228, 0.2);
        }

        .warning::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
            pointer-events: none;
        }

        .warning:hover::before {
            left: 100%;
        }

        .fade-on-scroll {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .fade-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }

        body, .container, table, th, td,
        .theme-btn, .back-link, .warning {
            transition: background-color 0.4s ease-in-out, 
                        color 0.4s ease-in-out, 
                        border-color 0.4s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-btn">🌙</button>
        <a href="index.html" class="back-link">← 返回首页</a>
        <h1>📚 完整作品目录</h1>

        <div class="warning">
            <strong>⚠️ 警告</strong>: 本站内容包含成人元素，请确保您已年满18岁并自愿承担阅读风险。
        </div>

        <table class="fade-on-scroll">
            <thead>
                <tr>
                    <th>作品名称</th>
                    <th>链接</th>
                    <th>格式</th>
                </tr>
            </thead>
            <tbody id="table-body">
                
        <tr>
            <td><strong>《妄想症_01_BadCen》</strong></td>
            <td><a href="reading/妄想症_01_BadCen.html" class="chapter-link">在线阅读</a></td>
            <td>PDF/TXT</td>
        </tr>
        

        <tr>
            <td><strong>《妄想症_02_swk_bc》</strong></td>
            <td><a href="reading/妄想症_02_swk_bc.html" class="chapter-link">在线阅读</a></td>
            <td>PDF/TXT</td>
        </tr>
        

        <tr>
            <td><strong>《妄想症_03_xty》</strong></td>
            <td><a href="reading/妄想症_03_xty.html" class="chapter-link">在线阅读</a></td>
            <td>PDF/TXT</td>
        </tr>
        
            </tbody>
        </table>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateButtonText(savedTheme);
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            updateButtonText('dark');
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateButtonText(newTheme);
        }
        
        function updateButtonText(theme) {
            themeToggle.textContent = theme === 'dark' ? '🌙' : '☀️';
        }
        
        themeToggle.addEventListener('click', toggleTheme);

        document.addEventListener('DOMContentLoaded', function() {
            const rows = document.querySelectorAll('#table-body tr');
            rows.forEach((row, index) => {
                row.style.setProperty('--row-index', index);
            });

            const fadeElements = document.querySelectorAll('.fade-on-scroll');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
            
            fadeElements.forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
